steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -t
      - asia-southeast2-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REPO/$_SERVICE_NAME:$COMMIT_SHA
      - .

  - name: "gcr.io/cloud-builders/docker"
    args:
      - push
      - asia-southeast2-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REPO/$_SERVICE_NAME:$COMMIT_SHA

  - name: "gcr.io/cloud-builders/gcloud"
    args:
      - run
      - deploy
      - $_SERVICE_NAME
      - --image
      - asia-southeast2-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REPO/$_SERVICE_NAME:$COMMIT_SHA
      - --platform
      - managed
      - --region
      - asia-southeast1
      - --allow-unauthenticated
      - --port
      - "8080"
      - --memory
      - 512Mi
      - --cpu
      - "1"
      - --concurrency
      - "80"
      - --timeout
      - "300"
      - --max-instances
      - "5"
      - --min-instances
      - "0"

substitutions:
  _SERVICE_NAME: gongaji-web-cms
  _ARTIFACT_REPO: gongaji-repo

images:
  - asia-southeast2-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REPO/$_SERVICE_NAME:$COMMIT_SHA