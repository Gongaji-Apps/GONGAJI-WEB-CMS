steps:
    - name: 'gcr.io/cloud-builders/docker'
      args: ['build', '-t', 'asia-southeast2-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REPO/$_SERVICE_NAME', '.']

    - name: 'gcr.io/cloud-builders/docker'
      args: ['push', 'asia-southeast2-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REPO/$_SERVICE_NAME']

    - name: 'gcr.io/cloud-builders/gcloud'
      args: [
              'run',
              'deploy',
              '$_SERVICE_NAME',
              '--image',
              'asia-southeast2-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REPO/$_SERVICE_NAME',
              '--platform',
              'managed',
              '--region',
              'asia-southeast1',
              '--allow-unauthenticated',
              '--port',
              '8080',
              '--memory',
              '512Mi',
              '--concurrency',
              '80',
              '--timeout',
              '300',
              '--max-instances',
              '5',
              '--min-instances',
              '0'
              # '--containerport',
              # '8080'
          ]

substitutions:
    _SERVICE_NAME: 'gongaji-web-cms'
    _ARTIFACT_REPO: 'gongaji-repo'

images:
    - asia-southeast2-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REPO/$_SERVICE_NAME
